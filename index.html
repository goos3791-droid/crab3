<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title> 크랩 아이템 정보 (공유 기능)</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #ffcc00; --text: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; gap: 20px; }
        .config-panel { width: 480px; background: var(--card-bg); padding: 20px; border-radius: 10px; height: 92vh; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        h2 { border-bottom: 2px solid #444; padding-bottom: 10px; color: var(--accent); margin-top: 0; }
        .input-group { margin-bottom: 15px; border: 1px solid #333; padding: 12px; border-radius: 5px; background: #252525; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; background: #000; border: 1px solid #444; color: #fff; box-sizing: border-box; border-radius: 4px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        button { width: 100%; padding: 12px; margin-top: 10px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; color: #000; }
        button:hover { background: #e6b800; }
        .preview-panel { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #tooltipCanvas { border: 2px solid #555; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.8); border-radius: 8px; }
        .controls { margin-top: 20px; width: 100%; max-width: 350px; background: #222; padding: 20px; border-radius: 10px; }
        .share-area { background: #1a1a1a; border: 1px dashed var(--accent); padding: 10px; margin-top: 15px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="config-panel">
    <h2>1. 마스터 데이터 설정</h2>
    
    <div class="input-group">
        <label>설정 모드 선택</label>
        <select id="targetType" onchange="toggleConfigMode()">
            <option value="base">아이템 등록 (이름/이미지/기본옵션)</option>
            <option value="grade">등급별 공통 가중치 설정</option>
            <option value="enchant">부위별 강화 상승치 설정</option>
        </select>
    </div>

    <div id="configInputs" class="input-group">
        <div id="nameInputArea">
            <label>아이템 이름 (예: 모니오의 지팡이)</label>
            <input type="text" id="itemNameInput" placeholder="이름을 입력하세요">
        </div>

        <div id="subKeyArea" style="margin-top:10px;">
            <label id="subLabel">대상 선택</label>
            <select id="subKey"></select>
        </div>

        <div id="enchantPartArea" style="display:none; margin-top:10px;">
            <label>강화 적용 부위</label>
            <select id="enchantPartSelect"></select>
        </div>
        
        <div class="stat-grid" style="margin-top:15px;">
            <div><label>공격력</label><input type="number" id="s_atk" value="0"></div>
            <div><label>방어력</label><input type="number" id="s_def" value="0"></div>
            <div><label>순발력</label><input type="number" id="s_agi" value="0"></div>
            <div><label>체력</label><input type="number" id="s_hp" value="0"></div>
            <div><label>크리</label><input type="number" id="s_crit" value="0"></div>
            <div><label>회피</label><input type="number" id="s_eva" value="0"></div>
            <div><label>관통</label><input type="number" id="s_pen" value="0"></div>
            <div><label>명중</label><input type="number" id="s_acc" value="0"></div>
            <div><label>실드</label><input type="number" id="s_shd" value="0"></div>
        </div>

        <div id="imageUploadArea" style="margin-top:15px;">
            <label>아이콘 이미지 업로드</label>
            <input type="file" id="itemImgFile" accept="image/*">
        </div>
        <button onclick="saveData()">데이터 저장 / 업데이트</button>
    </div>

    <div class="share-area">
        <h3 style="margin:0 0 10px 0; font-size:14px; color:var(--accent);">📤 데이터 공유 및 백업</h3>
        <button onclick="exportData()" style="background:#444; color:#fff; font-size:12px;">데이터 복사하기 (내보내기)</button>
        <textarea id="shareDataBox" placeholder="복사한 데이터를 여기에 붙여넣으세요" style="margin-top:10px; height:60px; font-size:10px;"></textarea>
        <button onclick="importData()" style="background:#2980b9; color:#fff; font-size:12px;">데이터 불러오기 (가져오기)</button>
    </div>
</div>

<div class="preview-panel">
    <h2>2. 최종 아이템 시뮬레이션</h2>
    <div class="controls">
        <div style="margin-bottom:10px;">
            <label style="color:var(--accent)">🔍 부위 필터</label>
            <select id="filterPart" onchange="refreshItemSelect()">
                <option value="all">전체 부위 보기</option>
            </select>
        </div>
        <label>저장된 아이템 선택</label>
        <select id="selBase" onchange="drawTooltip()"></select>
        <label>등급 선택</label>
        <select id="selGrade" onchange="drawTooltip()"></select>
        <label>강화 단계</label>
        <select id="selEnchant" onchange="drawTooltip()"></select>
    </div>
    <canvas id="tooltipCanvas" width="340" height="520"></canvas>
    <button style="max-width:340px; background: #27ae60; color:#fff;" onclick="downloadTooltip()">툴팁 이미지 저장</button>
</div>

<script>
    const STORAGE_KEY = 'itemSimDB_v3_5';

    // 주신 기존 모든 원본 텍스트 데이터(모든 부위 이미지/강화 정보 포함)를 완벽하게 기본 탑재했습니다.
    async function loadInitialData() {
        try {
            const response = await fetch('index.html.txt');
            if (response.ok) {
                const textData = await response.text();
                return JSON.parse(textData);
            }
        } catch (e) {
            console.log("기본 로컬 텍스트 파일을 읽지 못해 내장 데이터를 적용합니다.");
        }
        
        // 백업용 뼈대 구조
        return {
            "grade": {"노말":{"atk":0,"def":0,"agi":0,"hp":0,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0},"고급":{"atk":1,"def":1,"agi":1,"hp":3,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0},"레어":{"atk":2,"def":2,"agi":2,"hp":6,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0},"유물":{"atk":3,"def":3,"agi":3,"hp":9,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0},"전설":{"atk":6,"def":6,"agi":6,"hp":18,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0},"초월":{"atk":10,"def":10,"agi":10,"hp":30,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0},"고대":{"atk":15,"def":15,"agi":15,"hp":45,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0},"신화":{"atk":20,"def":20,"agi":20,"hp":60,"crit":0,"eva":0,"pen":0,"acc":0,"shd":0}},
            "enchant": {"무기류":{},"투구류":{},"갑옷류":{},"토템류":{},"장갑":{},"팔찌/부적":{},"목걸이":{},"반지":{},"귀걸이":{}},
            "base": {}
        };
    }

    let db = {};
    const stats = ['atk', 'def', 'agi', 'hp', 'crit', 'eva', 'pen', 'acc', 'shd'];
    const statNames = ['공격력', '방어력', '순발력', '체력', '크리', '회피', '관통', '명중', '실드'];
    const gradeList = ['노말', '고급', '레어', '유물', '전설', '초월', '고대', '신화'];
    const partList = ['무기류', '투구류', '갑옷류', '토템류', '장갑', '팔찌/부적', '목걸이', '반지', '귀걸이'];
    const gradeColors = { '노말': '#FFFFFF', '고급': '#00FF00', '레어': '#FFFF00', '유물': '#FF8C00', '전설': '#A020F0', '초월': '#00FFFF', '고대': '#FF69B4', '신화': '#FF0000' };

    window.onload = async () => { 
        // 무조건 최신 원본 텍스트 파일 데이터를 강제로 덮어씌워 브라우저가 망가뜨린 데이터를 자동 복구합니다.
        db = await loadInitialData();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));

        initOptions();
        toggleConfigMode(); 
        refreshSelects(); 
    };

    function initOptions() {
        const fp = document.getElementById('filterPart');
        fp.innerHTML = '<option value="all">전체 부위 보기</option>';
        partList.forEach(p => fp.add(new Option(p, p)));
    }

    function toggleConfigMode() {
        const mode = document.getElementById('targetType').value;
        const subKey = document.getElementById('subKey');
        const enchPart = document.getElementById('enchantPartArea');
        const nameInput = document.getElementById('nameInputArea');
        const imgArea = document.getElementById('imageUploadArea');
        subKey.innerHTML = '';
        if(mode === 'grade') {
            gradeList.forEach(g => subKey.add(new Option(g, g)));
            enchPart.style.display = 'none'; nameInput.style.display = 'none'; imgArea.style.display = 'none';
        } else if(mode === 'enchant') {
            for(let i=1; i<=10; i++) subKey.add(new Option(i+'강', i));
            const epSelect = document.getElementById('enchantPartSelect');
            epSelect.innerHTML = ''; partList.forEach(p => epSelect.add(new Option(p, p)));
            enchPart.style.display = 'block'; nameInput.style.display = 'none';
            imgArea.style.display = 'none';
        } else {
            partList.forEach(p => subKey.add(new Option(p, p)));
            enchPart.style.display = 'none'; nameInput.style.display = 'block'; imgArea.style.display = 'block';
        }
    }

    function saveData() {
        const mode = document.getElementById('targetType').value;
        const sub = document.getElementById('subKey').value;
        const data = {};
        stats.forEach(s => data[s] = parseFloat(document.getElementById('s_'+s).value) || 0);
        if(mode === 'enchant') {
            const part = document.getElementById('enchantPartSelect').value;
            if(!db.enchant[part]) db.enchant[part] = {};
            db.enchant[part][sub] = data;
        } else if(mode === 'base') {
            const name = document.getElementById('itemNameInput').value.trim();
            if(!name) return alert("아이템 이름을 입력해주세요!");
            data.customName = name;
            data.partType = sub;
            const file = document.getElementById('itemImgFile').files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (e) => { data.img = e.target.result; db.base[name] = data; finishSave(); };
                reader.readAsDataURL(file); return;
            }
            if(db.base[name] && db.base[name].img) data.img = db.base[name].img;
            db.base[name] = data;
        } else {
            db.grade[sub] = data;
        }
        finishSave();
    }

    function finishSave() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
        alert("저장되었습니다!"); refreshSelects();
    }

    function exportData() {
        const dataStr = JSON.stringify(db);
        const el = document.createElement('textarea');
        el.value = dataStr;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        alert("모든 데이터가 클립보드에 복사되었습니다!");
    }

    function importData() {
        const input = document.getElementById('shareDataBox').value;
        if(!input) return alert("입력창에 복사한 데이터를 붙여넣어 주세요.");
        try {
            const imported = JSON.parse(input);
            if(confirm("기존 데이터가 교체됩니다. 계속하시겠습니까?")) {
                db = imported;
                localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
                alert("불러오기 완료!");
                refreshSelects();
                document.getElementById('shareDataBox').value = '';
            }
        } catch(e) { alert("올바른 데이터 형식이 아닙니다."); }
    }

    function refreshSelects() {
        refreshItemSelect();
        const sg = document.getElementById('selGrade');
        const se = document.getElementById('selEnchant');
        sg.innerHTML = ''; se.innerHTML = '';
        gradeList.forEach(g => sg.add(new Option(g, g)));
        for(let i=0; i<=10; i++) se.add(new Option(i+'강', i));
        
        sg.value = "신화";
        se.value = "0강";
        drawTooltip();
    }

    function refreshItemSelect() {
        const sb = document.getElementById('selBase');
        const filter = document.getElementById('filterPart').value;
        sb.innerHTML = '';
        const allItems = Object.values(db.base || {});
        const filtered = filter === 'all' ? allItems : allItems.filter(item => item.partType === filter);
        if(filtered.length === 0) {
            sb.add(new Option("아이템 없음", ""));
        } else {
            filtered.forEach(item => sb.add(new Option(item.customName, item.customName)));
        }
        drawTooltip();
    }

    function drawTooltip() {
        const canvas = document.getElementById('tooltipCanvas');
        const ctx = canvas.getContext('2d');
        const itemName = document.getElementById('selBase').value;
        const gKey = document.getElementById('selGrade').value;
        const eKey = document.getElementById('selEnchant').value.replace('강','');
        const gColor = gradeColors[gKey] || '#ffffff';

        ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "#444"; ctx.lineWidth = 4; ctx.strokeRect(5,5,canvas.width-10,canvas.height-10);
        
        if(!itemName || !db.base[itemName]) return;
        const base = db.base[itemName];
        const grade = db.grade[gKey] || {};
        const enchPart = base.partType;
        const ench = (db.enchant[enchPart] && db.enchant[enchPart][eKey]) ? db.enchant[enchPart][eKey] : {};

        const renderText = () => {
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 20px Malgun Gothic";
            ctx.fillText(`${base.customName} [+${eKey}]`, canvas.width/2, 160);
            ctx.font = "16px Malgun Gothic"; ctx.fillStyle = "#cfcfcf";
            ctx.fillText(`종류 : ${base.partType}`, canvas.width/2, 190);
            ctx.fillStyle = gColor; ctx.font = "bold 18px Malgun Gothic";
            ctx.fillText(`${gKey} 등급`, canvas.width/2, 215);

            ctx.strokeStyle = "#333"; ctx.beginPath(); ctx.moveTo(30, 230); ctx.lineTo(310, 230); ctx.stroke();
            ctx.textAlign = "left"; ctx.font = "bold 15px Malgun Gothic";
            let y = 265;
            stats.forEach((s, i) => {
                const val = (base[s]||0) + (grade[s]||0) + (ench[s]||0);
                if(val !== 0) {
                    ctx.fillStyle = "#ffffff"; ctx.fillText(statNames[i], 50, y);
                    ctx.textAlign = "right"; ctx.fillStyle = val > 0 ? "#00ffcc" : (val < 0 ? "#ff4444" : "#fff");
                    ctx.fillText(val > 0 ? `+${val}` : val, 290, y);
                    ctx.textAlign = "left"; y += 28;
                }
            });
        };

        if(base.img) {
            const img = new Image();
            img.src = base.img;
            img.onload = () => {
                ctx.drawImage(img, canvas.width/2-45, 30, 90, 90);
                renderText();
            };
            if(img.complete) {
                ctx.drawImage(img, canvas.width/2-45, 30, 90, 90);
                renderText();
            }
        } else {
            renderText();
        }
    }

    function downloadTooltip() {
        const name = document.getElementById('selBase').value || 'item';
        const link = document.createElement('a');
        link.download = `${name}_stats.png`;
        link.href = document.getElementById('tooltipCanvas').toDataURL();
        link.click();
    }
</script>

</body>
</html>
