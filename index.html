<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아이템 툴팁 시뮬레이터 v3.5 (공유 기능)</title>
    <style>
        :root { --bg: #121212; --card-bg: #1e1e1e; --accent: #ffcc00; --text: #ffffff; }
        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; gap: 20px; }
        .config-panel { width: 480px; background: var(--card-bg); padding: 20px; border-radius: 10px; height: 92vh; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        h2 { border-bottom: 2px solid #444; padding-bottom: 10px; color: var(--accent); margin-top: 0; }
        .input-group { margin-bottom: 15px; border: 1px solid #333; padding: 12px; border-radius: 5px; background: #252525; }
        label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; background: #151515; border: 1px solid #444; color: #fff; border-radius: 4px; box-sizing: border-box; }
        input[type="range"] { padding: 0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { background: var(--accent); color: #000; border: none; padding: 10px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn:hover { background: #e6b800; }
        .btn-secondary { background: #444; color: #fff; margin-top: 5px; }
        .btn-secondary:hover { background: #555; }
        .preview-panel { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; border-radius: 10px; height: 92vh; position: relative; }
        canvas { background: #1c1c1c; border: 2px solid #333; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        .share-url { margin-top: 15px; width: 340px; background: #222; padding: 10px; border-radius: 5px; border: 1px solid #444; font-size: 12px; word-break: break-all; color: #00ffcc; text-align: center; }
    </style>
</head>
<body>

    <div class="config-panel">
        <h2>🔧 시뮬레이터 설정</h2>
        
        <div class="input-group">
            <label>기본 아이템 선택</label>
            <select id="itemPreset" onchange="loadPreset()"></select>
        </div>

        <div class="input-group">
            <label>아이템 이름 커스텀</label>
            <input type="text" id="customName" oninput="draw()">
        </div>

        <div class="grid-2">
            <div class="input-group">
                <label>아이템 종류</label>
                <select id="partType" onchange="updateEnchantOptions(); draw();">
                    <option value="무기류">무기류</option>
                    <option value="투구류">투구류</option>
                    <option value="갑옷류">갑옷류</option>
                    <option value="토템류">토템류</option>
                    <option value="장갑">장갑</option>
                    <option value="팔찌/부적">팔찌/부적</option>
                    <option value="목걸이">목걸이</option>
                    <option value="반지">반지</option>
                    <option value="귀걸이">귀걸이</option>
                </select>
            </div>
            <div class="input-group">
                <label>아이템 등급</label>
                <select id="gradeSelect" onchange="draw()"></select>
            </div>
        </div>

        <div class="grid-2">
            <div class="input-group">
                <label>강화 수치</label>
                <select id="enchantSelect" onchange="draw()"></select>
            </div>
            <div class="input-group">
                <label>아이템 이미지 URL</label>
                <input type="text" id="imgUrl" placeholder="data:image/... 또는 URL" oninput="draw()">
            </div>
        </div>

        <h2>📊 기본 능력치 수정 (프리셋 우회 가능)</h2>
        <div class="grid-2" id="baseStatsContainer"></div>

        <button class="btn" onclick="copyShareUrl()">🔗 공유 링크 복사하기</button>
        <button class="btn btn-secondary" onclick="resetToPreset()">🔄 현재 프리셋 원본으로 리셋</button>
    </div>

    <div class="preview-panel">
        <canvas id="tooltipCanvas" width="340" height="520"></canvas>
        <div class="share-url" id="shareUrlText">공유 링크가 여기에 표시됩니다.</div>
    </div>

        const statKeys = ["atk", "def", "agi", "hp", "crit", "eva", "pen", "acc", "shd"];
        const statNames = ["공격력", "방어력", "민첩", "체력", "크리티컬", "회피율", "방어관통", "명중률", "보호막"];
        const gradeColors = { "노말": "#b0b0b0", "고급": "#1eff00", "레어": "#0070dd", "유물": "#a335ee", "전설": "#ff8000", "초월": "#e6cc80", "고대": "#ffcc00", "신화": "#ff0044" };

        const canvas = document.getElementById("tooltipCanvas");
        const ctx = canvas.getContext("2d");

        // 초기화 함수
        window.onload = function() {
            // 등급 셀렉트 세팅
            const gradeSelect = document.getElementById("gradeSelect");
            Object.keys(itemData.grade).forEach(g => {
                let opt = document.createElement("option"); opt.value = g; opt.textContent = g;
                gradeSelect.appendChild(opt);
            });
            gradeSelect.value = "신화";

            // 프리셋 셀렉트 세팅
            const presetSelect = document.getElementById("itemPreset");
            Object.keys(itemData.base).forEach(k => {
                let opt = document.createElement("option"); opt.value = k; opt.textContent = k;
                presetSelect.appendChild(opt);
            });

            // 스탯 컨트롤러 생성
            const container = document.getElementById("baseStatsContainer");
            statKeys.forEach((s, i) => {
                container.innerHTML += `
                    <div class="input-group">
                        <label>${statNames[i]} (${s.toUpperCase()})</label>
                        <input type="number" id="base_${s}" value="0" oninput="draw()">
                    </div>`;
            });

            // URL 파라미터 확인 및 로드
            if(!loadFromUrl()) {
                presetSelect.value = "느림의미학";
                loadPreset();
            }
        };

        function updateEnchantOptions() {
            const pType = document.getElementById("partType").value;
            const enchSelect = document.getElementById("enchantSelect");
            enchSelect.innerHTML = '<option value="0">+0 강화</option>';
            if(itemData.enchant[pType]) {
                Object.keys(itemData.enchant[pType]).forEach(lvl => {
                    let opt = document.createElement("option"); opt.value = lvl; opt.textContent = `+${lvl} 강화`;
                    enchSelect.appendChild(opt);
                });
            }
        }

        function loadPreset() {
            const pName = document.getElementById("itemPreset").value;
            const item = itemData.base[pName];
            if(!item) return;

            document.getElementById("customName").value = item.customName;
            document.getElementById("partType").value = item.partType;
            document.getElementById("imgUrl").value = item.img || "";
            
            statKeys.forEach(s => {
                document.getElementById(`base_${s}`).value = item[s] || 0;
            });

            updateEnchantOptions();
            document.getElementById("enchantSelect").value = "0";
            draw();
        }

        function resetToPreset() {
            loadPreset();
        }

        function getActiveSpecs() {
            const pType = document.getElementById("partType").value;
            const gKey = document.getElementById("gradeSelect").value;
            const eKey = document.getElementById("enchantSelect").value;

            const base = { customName: document.getElementById("customName").value, partType: pType, img: document.getElementById("imgUrl").value };
            statKeys.forEach(s => { base[s] = parseInt(document.getElementById(`base_${s}`).value) || 0; });

            const grade = itemData.grade[gKey] || {};
            const ench = (itemData.enchant[pType] && itemData.enchant[pType][eKey]) ? itemData.enchant[pType][eKey] : {};

            return { base, grade, ench, gKey, eKey, gColor: gradeColors[gKey] || "#fff" };
        }

        function draw() {
            const { base, grade, ench, gKey, eKey, gColor } = getActiveSpecs();
            
            // 배경 그리기
            ctx.fillStyle = "#1e1e1e"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3; ctx.strokeStyle = gColor; ctx.strokeRect(5, 5, canvas.width-10, canvas.height-10);

            // 아이템 테두리 박스 및 이미지
            ctx.strokeStyle = "#444"; ctx.lineWidth = 2; ctx.strokeRect(canvas.width/2-50, 25, 100, 100);
            if(base.img) {
                let img = new Image();
                img.src = base.img;
                img.onload = () => ctx.drawImage(img, canvas.width/2-45, 30, 90, 90);
            }

            // 텍스트 출력
            ctx.textAlign = "center";
            ctx.fillStyle = "#ffffff"; ctx.font = "bold 20px Malgun Gothic";
            ctx.fillText(`${base.customName} [+${eKey}]`, canvas.width/2, 160);
            ctx.font = "16px Malgun Gothic"; ctx.fillStyle = "#cfcfcf";
            ctx.fillText(`종류 : ${base.partType}`, canvas.width/2, 190);
            ctx.fillStyle = gColor; ctx.font = "bold 18px Malgun Gothic";
            ctx.fillText(`${gKey} 등급`, canvas.width/2, 215);

            // 구분선
            ctx.strokeStyle = "#333"; ctx.beginPath(); ctx.moveTo(30, 230); ctx.lineTo(310, 230); ctx.stroke();

            // 능력치 출력
            ctx.textAlign = "left"; ctx.font = "bold 15px Malgun Gothic";
            let y = 265;
            statKeys.forEach((s, i) => {
                const bVal = base[s] || 0;
                const gVal = grade[s] || 0;
                const eVal = ench[s] || 0;
                const total = bVal + gVal + eVal;

                if(total !== 0 || bVal !== 0) {
                    ctx.fillStyle = "#ffffff"; ctx.fillText(statNames[i], 50, y);
                    ctx.textAlign = "right";
                    
                    // 총합 능력치 수치
                    ctx.fillStyle = varColor(total);
                    ctx.fillText(total > 0 ? `+${total}` : total, 290, y);
                    
                    // 상세 정보 주석 추가 (기본 + 등급 + 강화)
                    ctx.font = "11px Malgun Gothic"; ctx.fillStyle = "#888";
                    ctx.fillText(`(${bVal}익+${gVal}급+${eVal}강)`, 230, y-1);
                    ctx.font = "bold 15px Malgun Gothic"; ctx.textAlign = "left";
                    y += 24;
                }
            });

            updateShareUrl();
        }

        function varColor(val) { return val > 0 ? "#00ffcc" : (val < 0 ? "#ff4444" : "#fff"); }

        // 공유 링크 생성 기능
        function updateShareUrl() {
            const { base, gKey, eKey } = getActiveSpecs();
            const state = { n: base.customName, t: base.partType, g: gKey, e: eKey, i: base.img.startsWith("data:") ? "" : base.img };
            statKeys.forEach(s => { state[s] = base[s]; });
            
            const encoded = btoa(encodeURIComponent(JSON.stringify(state)));
            const shareUrl = `${window.location.origin}${window.location.pathname}?item=${encoded}`;
            document.getElementById("shareUrlText").textContent = shareUrl;
        }

        function copyShareUrl() {
            const url = document.getElementById("shareUrlText").textContent;
            navigator.clipboard.writeText(url).then(() => alert("공유 링크가 클립보드에 복사되었습니다!"));
        }

        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const itemParam = params.get("item");
            if(!itemParam) return false;

            try {
                const decoded = JSON.parse(decodeURIComponent(atob(itemParam)));
                document.getElementById("customName").value = decoded.n || "";
                document.getElementById("partType").value = decoded.t || "무기류";
                document.getElementById("gradeSelect").value = decoded.g || "노말";
                document.getElementById("imgUrl").value = decoded.i || "";
                
                updateEnchantOptions();
                document.getElementById("enchantSelect").value = decoded.e || "0";

                statKeys.forEach(s => {
                    document.getElementById(`base_${s}`).value = decoded[s] || 0;
                });
                draw();
                return true;
            } catch(e) {
                console.error("파라미터 로드 실패", e);
                return false;
            }
        }
    </script>
</body>
</html>
